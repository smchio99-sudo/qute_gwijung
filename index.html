<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>귀중이 희여워 ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #FFD6E8;
    --bg2: #FFF3C7;
    --main: #FF4D8D;
    --stroke: #7A2048;
    --accent: #FFB300;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg1));
    background-size: 300% 300%;
    animation: bgmove 8s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Black Han Sans', 'Jua', sans-serif;
    position: relative;
  }
  @keyframes bgmove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .placard {
    text-align: center;
    z-index: 2;
    padding: 0 4vw;
  }

  .sub {
    font-family: 'Jua', sans-serif;
    font-size: clamp(16px, 4vw, 32px);
    color: var(--stroke);
    letter-spacing: 0.4em;
    margin-bottom: 2vh;
    opacity: 0.85;
  }

  .main-text {
    font-size: clamp(56px, 17vw, 220px);
    line-height: 1.05;
    color: var(--main);
    -webkit-text-stroke: 0.04em var(--stroke);
    text-shadow:
      0.06em 0.06em 0 var(--accent),
      0.09em 0.09em 0 var(--stroke);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .main-text .line2 { display: block; }

  @keyframes bounce {
    0%, 100% { transform: scale(1) rotate(-1.5deg); }
    50% { transform: scale(1.04) rotate(1.5deg); }
  }

  .hearts-row {
    margin-top: 3vh;
    font-size: clamp(28px, 7vw, 64px);
    letter-spacing: 0.3em;
  }
  .hearts-row span {
    display: inline-block;
    animation: pop 0.9s ease-in-out infinite;
  }
  .hearts-row span:nth-child(2) { animation-delay: 0.15s; }
  .hearts-row span:nth-child(3) { animation-delay: 0.3s; }
  .hearts-row span:nth-child(4) { animation-delay: 0.45s; }
  .hearts-row span:nth-child(5) { animation-delay: 0.6s; }
  @keyframes pop {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-0.4em) scale(1.25); }
  }

  /* 떠다니는 하트 */
  .float-heart {
    position: absolute;
    bottom: -10vh;
    font-size: 24px;
    animation: floatUp linear infinite;
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-115vh) rotate(40deg); opacity: 0; }
  }

  .hint {
    position: fixed;
    bottom: 12px;
    width: 100%;
    text-align: center;
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    color: var(--stroke);
    opacity: 0.5;
    z-index: 3;
  }

  @media (prefers-reduced-motion: reduce) {
    .main-text, .hearts-row span, .float-heart, body { animation: none !important; }
  }
</style>
</head>
<body>

  <div class="placard" id="placard">
    <div class="sub">♡ 생일축하해 ♡</div>
    <div class="main-text">귀중이<span class="line2">희여워</span></div>
    <div class="hearts-row">
      <span>💗</span><span>🐰</span><span>💛</span><span>🐰</span><span>💗</span>
    </div>
  </div>

  <div class="hint">화면을 탭하면 하트가 터져요</div>

  <script>
    const emojis = ['💗','💖','💛','🩷','✨','🐰'];

    // 배경 떠다니는 하트
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('div');
      h.className = 'float-heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (18 + Math.random() * 30) + 'px';
      h.style.animationDuration = (6 + Math.random() * 6) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      document.body.appendChild(h);
    }

    // 탭하면 하트 폭발
    document.body.addEventListener('pointerdown', (e) => {
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${16 + Math.random()*20}px;pointer-events:none;z-index:9;transition:transform 0.9s ease-out, opacity 0.9s ease-out;`;
        document.body.appendChild(p);
        const ang = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 120;
        requestAnimationFrame(() => {
          p.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px) rotate(${(Math.random()-0.5)*180}deg)`;
          p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 1000);
      }
    });
  </script>
</body>
</html>
